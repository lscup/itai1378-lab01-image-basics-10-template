name: Autograding Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert pytest

    - name: testnotebookexecution
      id: testnotebookexecution
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Notebook Execution"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 10

    - name: testimportstatements
      id: testimportstatements
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Import Statements"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimageloading
      id: testimageloading
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Loading"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimagetypeandshape
      id: testimagetypeandshape
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Type and Shape"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimageconversion
      id: testimageconversion
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Conversion"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 15

    - name: testimagedisplay
      id: testimagedisplay
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Display"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 15

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTNOTEBOOKEXECUTION_RESULTS: "${{steps.testnotebookexecution.outputs.result}}"
        TESTIMPORTSTATEMENTS_RESULTS: "${{steps.testimportstatements.outputs.result}}"
        TESTIMAGELOADING_RESULTS: "${{steps.testimageloading.outputs.result}}"
        TESTIMAGETYPEANDSHAPE_RESULTS: "${{steps.testimagetypeandshape.outputs.result}}"
        TESTIMAGECONVERSION_RESULTS: "${{steps.testimageconversion.outputs.result}}"
        TESTIMAGEDISPLAY_RESULTS: "${{steps.testimagedisplay.outputs.result}}"
      with:
        runners: testnotebookexecution,testimportstatements,testimageloading,testimagetypeandshape,testimageconversion,testimagedisplay
